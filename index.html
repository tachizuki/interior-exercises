<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インテリア課題集</title>
<style>
  body{margin:0;background:#faf7f2;color:#3a352f;
    font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;line-height:1.7;}
  .wrap{max-width:720px;margin:0 auto;padding:60px 20px 80px;}
  .eyebrow{color:#b08d63;font-size:12px;letter-spacing:.25em;font-weight:700;margin:0 0 10px;}
  h1{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:28px;font-weight:600;
    margin:0 0 6px;border-bottom:2px solid #b08d63;padding-bottom:18px;}
  .sub{color:#8a8175;font-size:14px;margin:0 0 30px;}
  a.card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #e7e0d6;
    border-radius:14px;padding:20px 22px;margin:14px 0;transition:box-shadow .15s,transform .15s;}
  a.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.06);transform:translateY(-1px);}
  .date{color:#b08d63;font-size:12px;font-weight:700;letter-spacing:.05em;}
  .title{font-size:18px;font-weight:700;margin:4px 0 4px;}
  .desc{color:#8a8175;font-size:13px;margin:0;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">INTERIOR EXERCISES</p>
  <h1>インテリア課題集</h1>
  <p class="sub">インテリア塾の月次課題のまとめ</p>

  <a class="card" href="2026-06-workspace-ldk/">
    <span class="date">2026.06</span>
    <div class="title">ワークスペースのあるLDK</div>
    <p class="desc">4人家族・新居／在宅ワークと子育ての両立。提案・使用家具・概算費用・3Dパース</p>
  </a>
</div>
</body>
</html>
